<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A bunch of utils function for personal use</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
<div id="app"></div>
<script>
    window.$docsify = {
        name: 'utils',
        repo: 'aazerra/utils',
        themeColor: "#8238C7",
        auto2top: true,
        loadSidebar: true,
        loadNavbar: true,
        subMaxLevel: 2,
        routerMode: 'history',
        topMargin: 5, // default: 0
        formatUpdated: '{MM}/{DD} {HH}:{mm}',
        coverpage: true,
        alias: {
            '.*?/changelog': 'https://raw.githubusercontent.com/aazerra/utils/master/CHANGELOG.md',
        },
    }
</script>
<!-- Docsify v4 -->
<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
<script src="//unpkg.com/docsify/lib/plugins/search.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1.24.1/components/prism-python.js"></script>
</body>
</html>
